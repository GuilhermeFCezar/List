<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - O Império</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #050505; 
            color: #e5e7eb; 
            font-family: 'Montserrat', sans-serif; 
            padding: 20px; 
            margin: 0;
        }
        .container { 
            max-width: 900px; 
            margin: auto; 
            background: #16161a; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #2a1111; 
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #374151; 
            padding-bottom: 20px; 
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        h1 { 
            color: #ff3333; 
            font-size: 1.5rem; 
            margin: 0; 
        }
        .btn-sair { 
            background: transparent; 
            color: #9ca3af; 
            border: 1px solid #9ca3af; 
            padding: 8px 15px; 
            border-radius: 6px; 
            text-decoration: none; 
            font-size: 0.9rem;
        }
        .btn-sair:hover { 
            background: #374151; 
            color: white; 
        }

        /* Tabela no Desktop */
        .tabela { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
        }
        th, td { 
            text-align: left; 
            padding: 12px; 
            border-bottom: 1px solid #2a1111; 
        }
        th { 
            color: #ff3333; 
            font-weight: 600; 
        }
        .badge-livre { 
            color: #10b981; /* Verde */
            font-weight: 600; 
        }
        .badge-ocupado { 
            color: #9ca3af; /* Cinza */
        }
        .btn-liberar { 
            background: #ff3333; 
            color: white; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.85rem; 
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
        }
        .btn-liberar:hover { 
            background: #cc0000; 
        }
        .dado-texto {
            word-break: break-word; /* Evita que nomes gigantes quebrem a tela */
        }

        /* Mágica da Responsividade (Celular) */
        @media (max-width: 650px) {
            .tabela thead { 
                display: none; /* Esconde o cabeçalho original */
            }
            .tabela, .tabela tbody, .tabela tr, .tabela td { 
                display: block; 
                width: 100%; 
            }
            .tabela tr { 
                margin-bottom: 15px; 
                background: #121215; 
                border: 1px solid #374151; 
                border-radius: 8px; 
                padding: 15px; 
            }
            .tabela td { 
                border-bottom: 1px dashed #2a1111; 
                display: flex; 
                justify-content: space-between; 
                align-items: center; 
                padding: 10px 0; 
                text-align: right; 
            }
            .tabela td:last-child { 
                border-bottom: none; 
                display: block; 
                margin-top: 15px; 
                padding-bottom: 0;
            }
            
            /* Recria os títulos das colunas via CSS usando o data-label */
            .tabela td::before { 
                content: attr(data-label); 
                font-weight: 600; 
                color: #ff3333; 
                text-align: left; 
                flex-basis: 40%; 
                font-size: 0.9rem;
            }
            .tabela td span { 
                flex-basis: 60%; 
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Gerenciamento Imperial</h1>
            <a href="{{ url_for('logout') }}" class="btn-sair">Sair da Base</a>
        </div>

        <table class="tabela">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Status</th>
                    <th>Doador</th>
                    <th>Telefone</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody>
                {% for item in itens %}
                <tr>
                    <td data-label="Item:"><span class="dado-texto">{{ item[1] }}</span></td>
                    
                    {% if item[3] == 1 %}
                        <td data-label="Status:"><span class="badge-livre">Disponível</span></td>
                        <td data-label="Doador:"><span>-</span></td>
                        <td data-label="Telefone:"><span>-</span></td>
                        <td data-label="Ação:"><span>-</span></td>
                    {% else %}
                        <td data-label="Status:"><span class="badge-ocupado">Reservado</span></td>
                        <td data-label="Doador:"><span class="dado-texto"><strong>{{ item[4] }}</strong></span></td>
                        <td data-label="Telefone:"><span class="dado-texto">{{ item[5] }}</span></td>
                        <td data-label="Ação:">
                            <form action="{{ url_for('liberar', id=item[0]) }}" method="POST" onsubmit="return confirm('Tem certeza que deseja liberar este item? Os dados de quem reservou serão apagados.');">
                                <button type="submit" class="btn-liberar">Liberar Item</button>
                            </form>
                        </td>
                    {% endif %}
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>

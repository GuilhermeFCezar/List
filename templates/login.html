<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #e5e7eb; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: rgba(22, 22, 26, 0.9); padding: 40px; border-radius: 12px; box-shadow: 0 0 20px rgba(255, 51, 51, 0.2); border: 1px solid #2a1111; width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #ff3333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #050505; border: 1px solid #374151; color: white; border-radius: 8px; outline: none; box-sizing: border-box; }
        input:focus { border-color: #ff3333; }
        button { width: 100%; padding: 12px; background: #ff3333; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 15px; }
        button:hover { background: #cc0000; }
        .erro { color: #ff4d4d; font-size: 0.9rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Painel de Controle</h2>
        {% if erro %} <div class="erro">{{ erro }}</div> {% endif %}
        <form method="POST">
            <input type="text" name="usuario" placeholder="Usuário" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">Entrar na Base</button>
        </form>
        <a href="{{ url_for('index') }}" style="display: block; margin-top: 20px; color: #9ca3af; text-decoration: none; font-size: 0.9rem;">Voltar para o site</a>
    </div>
</body>
</html>
